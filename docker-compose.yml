services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: spool-db
    environment:
      POSTGRES_DB: spool
      POSTGRES_USER: spool
      POSTGRES_PASSWORD: spool
    ports:
      - "5434:5432"
    volumes:
      - spool_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spool"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  spool_data:
